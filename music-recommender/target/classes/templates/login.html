<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Telugu Beats</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #ff007f;
            --accent: #00f0ff;
            --background: #06040f;
            --surface: rgba(15, 12, 41, 0.4);
            --surface-hover: rgba(15, 12, 41, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #a2a2c2;
            --error: #ff4d6e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--background);
            background: radial-gradient(circle at 50% 50%, #1c1537 0%, #080611 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract animated shapes in background */
        .shape {
            position: absolute;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.45;
            animation: float 20s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 450px;
            height: 450px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            top: -150px;
            left: -150px;
            border-radius: 43% 57% 41% 59% / 57% 45% 55% 43%;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            bottom: -150px;
            right: -100px;
            border-radius: 50% 50% 30% 70% / 50% 60% 40% 50%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            100% {
                transform: translate(60px, 40px) rotate(180deg) scale(1.15);
            }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
            perspective: 1000px;
        }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
                        0 10px 40px rgba(138, 43, 226, 0.1);
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .logo-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .logo-icon {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(255, 0, 127, 0.3));
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 30%, #a2a2c2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
            pointer-events: none;
            transition: color 0.3s ease;
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.8rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.25),
                        0 0 0 1px var(--primary) inset;
        }

        input:focus + .input-icon {
            color: var(--accent);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            background-size: 200% auto;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 1.1rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            width: 100%;
            box-shadow: 0 10px 25px rgba(255, 0, 127, 0.25);
            margin-top: 1rem;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 0, 127, 0.45),
                        0 0 15px rgba(0, 240, 255, 0.2);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(255, 77, 110, 0.08);
            border: 1px solid rgba(255, 77, 110, 0.2);
            color: var(--error);
            padding: 0.9rem;
            border-radius: 12px;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 77, 110, 0.1);
        }

        .footer-text {
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.88rem;
            line-height: 1.5;
        }

        .footer-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer-text a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="login-container">
        <div class="glass-panel">
            <div class="logo-container">
                <span class="logo-icon">🎵</span>
            </div>
            <h1>Telugu Beats</h1>
            <p class="subtitle">Sign in to your account</p>

            <div th:if="${error}" class="error-message">
                ⚠️ <span th:text="${error}">Invalid username or password.</span>
            </div>

            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="footer-text">
                Don't have an account? <a href="#">Sign Up</a>
                <br>
                <small style="opacity: 0.5; margin-top: 10px; display: block;">Default Credentials: Geethika / 123</small>
            </div>
        </div>
    </div>
</body>
</html>
